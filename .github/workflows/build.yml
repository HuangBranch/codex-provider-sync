name: build-desktop

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      platform:
        description: Platform to build
        required: true
        default: macos
        type: choice
        options:
          - macos
          - windows
          - all

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-macos:
    runs-on: macos-latest
    if: ${{ github.event_name == 'push' || github.event.inputs.platform == 'macos' || github.event.inputs.platform == 'all' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build desktop app
        run: pnpm -C packages/desktop tauri build --bundles dmg

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: |
            packages/desktop/src-tauri/target/release/bundle/**

  build-windows:
    runs-on: windows-latest
    if: ${{ github.event_name == 'workflow_dispatch' && (github.event.inputs.platform == 'windows' || github.event.inputs.platform == 'all') }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build desktop app
        run: pnpm -C packages/desktop tauri build --bundles nsis

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-nsis
          path: |
            packages/desktop/src-tauri/target/release/bundle/**
